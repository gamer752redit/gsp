<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Austausch | gamer752</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .file-card { transition: all 0.2s ease-in-out; }
        .file-card:hover { transform: scale(1.01); background-color: #1e293b; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="mb-10 text-center md:text-left">
            <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2">
                File <span class="text-blue-500">Share</span>
            </h1>
            <p class="text-slate-400">Alle Dateien</p>
        </header>

        <div class="relative mb-8">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span class="text-slate-500">🔍</span>
            </div>
            <input type="text" id="searchInput" placeholder="Nach Dateien suchen..." 
                class="w-full p-4 pl-10 bg-slate-800 border border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-600 outline-none transition-all shadow-2xl">
        </div>

        <div id="fileList" class="grid gap-3">
            <div class="text-center p-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mb-4"></div>
                <p class="text-slate-500 italic">Verbindung zur API wird hergestellt...</p>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURATION ---
        const repoOwner = "gamer752redit"; // Hier Username einfügen
        const repoName = "gsp";         // Hier Repo-Namen einfügen
        // ---------------------

        const fileListContainer = document.getElementById('fileList');
        const searchInput = document.getElementById('searchInput');
        let allFiles = [];

        async function fetchFiles() {
            try {
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/`);
                
                if (!response.ok) {
                    throw new Error(`GitHub API Fehler: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                
                // Sicherheitsscheck: Ist data ein Array?
                if (!Array.isArray(data)) {
                    throw new Error("Die API hat keine Dateiliste zurückgegeben. Prüfe, ob das Repo öffentlich ist.");
                }

                // Alle Dateien laden, außer der index.html selbst
                allFiles = data.filter(file => 
                    file.type === 'file' && 
                    file.name.toLowerCase() !== 'index.html'
                );

                renderFiles(allFiles);
            } catch (error) {
                fileListContainer.innerHTML = `
                    <div class="bg-red-900/30 border border-red-500/50 p-6 rounded-2xl text-center">
                        <p class="text-red-400 font-bold mb-2">Ladefehler</p>
                        <p class="text-red-200 text-sm mb-4">${error.message}</p>
                        <p class="text-xs text-slate-500">Stelle sicher, dass <b>repoOwner</b> und <b>repoName</b> im Code korrekt gesetzt sind und das Repo <b>Public</b> ist.</p>
                    </div>`;
            }
        }

        function getIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                mp3: '🎵', wav: '🎵', flac: '🎵', ogg: '🎵',
                mp4: '🎬', mov: '🎬', avi: '🎬', mkv: '🎬', webm: '🎬',
                jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', svg: '🖼️',
                pdf: '📄', txt: '📝', md: '📝',
                zip: '📦', rar: '📦', '7z': '📦',
                js: '⚙️', html: '🌐', css: '🎨'
            };
            return icons[ext] || '📄';
        }

        function renderFiles(files) {
            if (files.length === 0) {
                fileListContainer.innerHTML = `
                    <div class="text-center p-10 bg-slate-800/50 rounded-2xl border border-dashed border-slate-700">
                        <p class="text-slate-500">Keine Dateien gefunden.</p>
                    </div>`;
                return;
            }

            fileListContainer.innerHTML = files.map(file => {
                const fileSize = file.size > 1024 * 1024 
                    ? (file.size / (1024 * 1024)).toFixed(2) + ' MB' 
                    : (file.size / 1024).toFixed(1) + ' KB';

                return `
                    <div class="file-card bg-slate-800 p-4 rounded-2xl border border-slate-700 flex items-center justify-between shadow-sm">
                        <div class="flex items-center space-x-4 overflow-hidden">
                            <div class="bg-slate-700 w-12 h-12 rounded-xl flex items-center justify-center text-2xl shrink-0">
                                ${getIcon(file.name)}
                            </div>
                            <div class="truncate">
                                <h3 class="font-semibold text-slate-100 truncate pr-4" title="${file.name}">${file.name}</h3>
                                <p class="text-xs text-slate-500 font-mono uppercase tracking-wider">${fileSize}</p>
                            </div>
                        </div>
                        <div class="shrink-0 ml-4">
                            <a href="${file.download_url}" target="_blank" 
                               class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-xl text-sm font-bold transition-all inline-block shadow-lg shadow-blue-900/20">
                                Download
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Such-Logik
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allFiles.filter(file => file.name.toLowerCase().includes(term));
            renderFiles(filtered);
        });

        // Initialer Aufruf
        fetchFiles();
    </script>
</body>
</html>
