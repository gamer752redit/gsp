<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Austausch | gamer752</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .file-card { transition: all 0.2s ease-in-out; }
        .file-card:hover { transform: scale(1.01); background-color: #1e293b; }
        #previewModal { backdrop-filter: blur(12px); }
        .preview-content img, .preview-content video { max-height: 75vh; margin: auto; object-fit: contain; }
        .iframe-container { width: 100%; height: 75vh; background: white; border-radius: 12px; overflow: hidden; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        audio::-webkit-media-controls-panel { background-color: #1e293b; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="mb-10 text-center md:text-left">
            <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2">
                File <span class="text-blue-500">Share</span>
            </h1>
            <p class="text-slate-400">Alle Dateien von <span class="text-slate-200">gamer752</span></p>
        </header>

        <div class="relative mb-8">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span class="text-slate-500">🔍</span>
            </div>
            <input type="text" id="searchInput" placeholder="Nach Dateien suchen..." 
                class="w-full p-4 pl-10 bg-slate-800 border border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-600 outline-none transition-all shadow-2xl">
        </div>

        <div id="fileList" class="grid gap-3">
            <div class="text-center p-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mb-4"></div>
                <p class="text-slate-500 italic">Verbindung zur API wird hergestellt...</p>
            </div>
        </div>
    </div>

    <div id="previewModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-2 md:p-6 bg-black/90">
        <div class="bg-slate-900 w-full max-w-6xl max-h-[95vh] rounded-3xl border border-slate-700 overflow-hidden flex flex-col shadow-2xl">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800">
                <div class="flex items-center space-x-3 overflow-hidden">
                    <span id="modalIcon" class="text-xl"></span>
                    <h2 id="modalTitle" class="font-bold truncate text-slate-200 text-sm md:text-base pr-4">Vorschau</h2>
                </div>
                <button onclick="closePreview()" class="text-slate-400 hover:text-white p-2 text-2xl transition-colors">&times;</button>
            </div>
            <div id="modalBody" class="p-4 md:p-6 overflow-auto flex-grow preview-content flex flex-col items-center justify-center bg-slate-950/30">
                </div>
        </div>
    </div>

    <script>
        const repoOwner = "gamer752redit";
        const repoName = "gsp";

        const fileListContainer = document.getElementById('fileList');
        const searchInput = document.getElementById('searchInput');
        const previewModal = document.getElementById('previewModal');
        const modalBody = document.getElementById('modalBody');
        const modalTitle = document.getElementById('modalTitle');
        const modalIcon = document.getElementById('modalIcon');
        let allFiles = [];
        let currentBlobUrl = null;

        async function fetchFiles() {
            try {
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/`);
                if (!response.ok) throw new Error(`Fehler: ${response.status}`);
                const data = await response.json();
                allFiles = data.filter(file => file.type === 'file' && file.name.toLowerCase() !== 'index.html');
                renderFiles(allFiles);
            } catch (error) {
                fileListContainer.innerHTML = `<div class="bg-red-900/30 border border-red-500/50 p-6 rounded-2xl text-center text-red-400">${error.message}</div>`;
            }
        }

        function getIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                mp3: '🎵', wav: '🎵', flac: '🎵', ogg: '🎵',
                mp4: '🎬', webm: '🎬',
                jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', svg: '🖼️', avif: '🖼️', webp: '🖼️',
                html: '🌐', js: '⚙️', css: '🎨', txt: '📝', md: '📝', json: '📋'
            };
            return icons[ext] || '📄';
        }

        function renderFiles(files) {
            if (files.length === 0) {
                fileListContainer.innerHTML = `<div class="text-center p-10 bg-slate-800/50 rounded-2xl border border-dashed border-slate-700 text-slate-500">Keine Dateien gefunden.</div>`;
                return;
            }
            fileListContainer.innerHTML = files.map((file) => `
                <div class="file-card bg-slate-800 p-4 rounded-2xl border border-slate-700 flex flex-wrap md:flex-nowrap items-center justify-between shadow-sm gap-4">
                    <div class="flex items-center space-x-4 overflow-hidden flex-grow">
                        <div class="bg-slate-700 w-12 h-12 rounded-xl flex items-center justify-center text-2xl shrink-0">${getIcon(file.name)}</div>
                        <div class="truncate">
                            <h3 class="font-semibold text-slate-100 truncate pr-4">${file.name}</h3>
                            <p class="text-xs text-slate-500 font-mono uppercase tracking-wider">${(file.size / 1024).toFixed(1)} KB</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2 shrink-0 w-full md:w-auto justify-end">
                        <button onclick="openPreview('${file.url}', '${file.download_url}', '${file.name}')" class="bg-slate-700 hover:bg-slate-600 text-slate-200 px-5 py-2 rounded-xl text-sm font-bold transition-all">Vorschau</button>
                        <a href="${file.download_url}" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-xl text-sm font-bold transition-all">Download</a>
                    </div>
                </div>
            `).join('');
        }

        async function openPreview(apiUrl, downloadUrl, name) {
            const ext = name.split('.').pop().toLowerCase();
            modalTitle.innerText = name;
            modalIcon.innerText = getIcon(name);
            modalBody.innerHTML = '<div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>';
            previewModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            if (['jpg', 'jpeg', 'png', 'gif', 'svg', 'avif', 'webp'].includes(ext)) {
                modalBody.innerHTML = `<img src="${downloadUrl}" class="rounded-lg shadow-2xl">`;
            } 
            else if (ext === 'html' || ['txt', 'js', 'css', 'md', 'json'].includes(ext)) {
                try {
                    const res = await fetch(apiUrl);
                    const data = await res.json();
                    const text = decodeURIComponent(escape(atob(data.content))); // UTF-8 Support

                    if (ext === 'html') {
                        const blob = new Blob([text], { type: 'text/html' });
                        currentBlobUrl = URL.createObjectURL(blob);
                        modalBody.innerHTML = `
                            <div class="iframe-container shadow-2xl border border-slate-700">
                                <iframe src="${currentBlobUrl}" class="w-full h-full" sandbox="allow-scripts allow-same-origin"></iframe>
                            </div>`;
                    } else {
                        modalBody.innerHTML = `<pre class="text-left w-full p-4 bg-slate-900 text-blue-300 rounded-lg text-sm font-mono border border-slate-800 overflow-x-auto">${escapeHtml(text)}</pre>`;
                    }
                } catch (e) {
                    modalBody.innerHTML = '<p class="text-red-400">Vorschau konnte nicht generiert werden.</p>';
                }
            } 
            else if (['mp4', 'webm', 'ogg'].includes(ext)) {
                modalBody.innerHTML = `<video controls class="w-full rounded-lg shadow-2xl" src="${downloadUrl}"></video>`;
            } 
            else if (['mp3', 'wav', 'ogg', 'm4a'].includes(ext)) {
                modalBody.innerHTML = `
                    <div class="text-center w-full max-w-md p-8 bg-slate-800 rounded-3xl border border-slate-700 shadow-xl">
                        <div class="text-6xl mb-6">🎵</div>
                        <audio controls class="w-full" src="${downloadUrl}"></audio>
                    </div>`;
            } else {
                modalBody.innerHTML = `<div class="text-center"><p class="text-4xl mb-4">${getIcon(name)}</p><p class="text-slate-400">Keine Vorschau verfügbar.</p></div>`;
            }
        }

        function closePreview() {
            previewModal.classList.add('hidden');
            modalBody.innerHTML = '';
            document.body.style.overflow = 'auto';
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allFiles.filter(file => file.name.toLowerCase().includes(term));
            renderFiles(filtered);
        });

        previewModal.addEventListener('click', (e) => { if (e.target === previewModal) closePreview(); });
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePreview(); });

        fetchFiles();
    </script>
</body>
</html>
