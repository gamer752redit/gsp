<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSP Private Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3); }
        
        #loginScreen { z-index: 999; transition: all 0.5s ease; }
        .hidden-ui { display: none !important; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.4s ease-in-out; border-color: #ef4444 !important; }
    </style>
</head>
<body class="min-h-screen">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 flex items-center justify-center bg-[#020617]">
        <div class="max-w-md w-full p-8 text-center">
            <div class="mb-10">
                <div class="w-20 h-20 bg-blue-600 rounded-[2rem] flex items-center justify-center text-4xl mx-auto mb-6 shadow-2xl shadow-blue-500/40">G</div>
                <h1 class="text-3xl font-extrabold tracking-tight">GSP <span class="text-blue-500">Cloud</span></h1>
                <p class="text-slate-500 mt-2">Privates Datei-Archiv</p>
            </div>
            
            <div class="space-y-4">
                <input type="password" id="pinInput" placeholder="Passwort-Code" 
                    class="w-full p-5 bg-slate-900 border border-slate-800 rounded-2xl outline-none focus:border-blue-500 transition-all text-center text-2xl tracking-[0.5em] text-white">
                <button onclick="checkPin()" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-bold text-lg transition-all active:scale-95 shadow-lg shadow-blue-600/20">
                    Dashboard betreten
                </button>
            </div>
            
            <div class="mt-12 p-6 rounded-3xl border border-white/5 bg-white/5">
                <p class="text-[10px] text-slate-500 uppercase tracking-widest leading-relaxed">
                    Privater Server-Zugriff. Alle Daten unterliegen der privaten Geheimhaltung. 
                    Kein Impressum erforderlich da keine gewerbliche Nutzung.
                </p>
            </div>
        </div>
    </div>

    <!-- DASHBOARD CONTENT -->
    <div id="dashboard" class="hidden-ui p-4 md:p-8 max-w-7xl mx-auto">
        
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h2 class="text-slate-500 font-semibold uppercase tracking-wider text-xs">System Dashboard</h2>
                <h1 id="welcomeText" class="text-3xl font-black text-white mt-1">Guten Tag, Admin</h1>
            </div>
            <div class="flex gap-3">
                <button onclick="logout()" class="p-3 bg-red-500/10 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all text-sm font-bold">Cloud sperren</button>
            </div>
        </header>

        <!-- STATS GRID -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-6 rounded-[2rem] flex items-center gap-5">
                <div class="w-14 h-14 bg-blue-500/20 rounded-2xl flex items-center justify-center text-2xl text-blue-500">📁</div>
                <div>
                    <p class="text-slate-500 text-sm font-medium">Dateien gesamt</p>
                    <h3 id="statCount" class="text-2xl font-bold">0</h3>
                </div>
            </div>
            <div class="glass p-6 rounded-[2rem] flex items-center gap-5">
                <div class="w-14 h-14 bg-emerald-500/20 rounded-2xl flex items-center justify-center text-2xl text-emerald-500">💾</div>
                <div>
                    <p class="text-slate-500 text-sm font-medium">Belegter Speicher</p>
                    <h3 id="statSize" class="text-2xl font-bold">0 MB</h3>
                </div>
            </div>
            <div class="glass p-6 rounded-[2rem] flex items-center gap-5">
                <div class="w-14 h-14 bg-amber-500/20 rounded-2xl flex items-center justify-center text-2xl text-amber-500">⚡</div>
                <div>
                    <p class="text-slate-500 text-sm font-medium">Status</p>
                    <h3 class="text-2xl font-bold text-emerald-400">Online</h3>
                </div>
            </div>
        </div>

        <!-- SEARCH & FILTER -->
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <div class="relative flex-grow">
                <input type="text" id="searchInput" placeholder="Suchen in Cloud..." 
                    class="w-full p-5 pl-14 bg-slate-900/50 border border-slate-800 rounded-3xl outline-none focus:border-blue-500 transition-all">
                <span class="absolute left-6 top-1/2 -translate-y-1/2 opacity-40">🔍</span>
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2">
                <button onclick="filterBy('all')" class="bg-blue-600 px-6 py-4 rounded-2xl font-bold text-sm">Alles</button>
                <button onclick="filterBy('image')" class="glass px-6 py-4 rounded-2xl font-bold text-sm hover:bg-slate-800">Bilder</button>
                <button onclick="filterBy('video')" class="glass px-6 py-4 rounded-2xl font-bold text-sm hover:bg-slate-800">Videos</button>
                <button onclick="filterBy('audio')" class="glass px-6 py-4 rounded-2xl font-bold text-sm hover:bg-slate-800">Audio</button>
            </div>
        </div>

        <!-- FILE LIST -->
        <div id="fileGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Dynamisch gefüllt -->
        </div>
    </div>

    <!-- MODAL VORSCHAU -->
    <div id="previewModal" class="fixed inset-0 z-[1000] hidden flex items-center justify-center p-4 bg-black/95">
        <div class="bg-slate-900 w-full max-w-4xl max-h-[90vh] rounded-[3rem] border border-white/10 overflow-hidden flex flex-col shadow-2xl">
            <div class="p-6 flex justify-between items-center border-b border-white/5">
                <h2 id="modalTitle" class="font-bold truncate pr-4 text-lg">Vorschau</h2>
                <button onclick="closePreview()" class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center hover:bg-white/10 transition-all text-xl">✕</button>
            </div>
            <div id="modalBody" class="p-6 overflow-auto flex-grow flex items-center justify-center bg-slate-950/20"></div>
        </div>
    </div>

    <script>
        const REPO_OWNER = "gamer752redit";
        const REPO_NAME = "gsp";
        const SECRET_PIN = "7521";
        let allFiles = [];

        // 1. PIN CHECK
        function checkPin() {
            const val = document.getElementById('pinInput').value;
            if(val === SECRET_PIN) {
                sessionStorage.setItem('unlocked', 'true');
                initDashboard();
            } else {
                const el = document.getElementById('pinInput');
                el.classList.add('shake');
                el.value = '';
                setTimeout(() => el.classList.remove('shake'), 400);
            }
        }

        // 2. DASHBOARD INIT
        function initDashboard() {
            document.getElementById('loginScreen').classList.add('hidden-ui');
            document.getElementById('dashboard').classList.remove('hidden-ui');
            
            const hour = new Date().getHours();
            const welcome = document.getElementById('welcomeText');
            if(hour < 12) welcome.innerText = "Guten Morgen, Admin";
            else if(hour < 18) welcome.innerText = "Guten Tag, Admin";
            else welcome.innerText = "Guten Abend, Admin";

            fetchData();
        }

        // 3. DATA FETCHING
        async function fetchData() {
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`);
                const data = await res.json();
                allFiles = data.filter(f => f.type === 'file' && f.name !== 'index.html');
                
                updateStats();
                renderFiles(allFiles);
            } catch (err) {
                console.error("Fehler beim Laden:", err);
            }
        }

        // 4. STATS UPDATE
        function updateStats() {
            document.getElementById('statCount').innerText = allFiles.length;
            const totalSize = allFiles.reduce((acc, curr) => acc + curr.size, 0);
            document.getElementById('statSize').innerText = (totalSize / (1024 * 1024)).toFixed(1) + " MB";
        }

        // 5. RENDER FILES
        function renderFiles(files) {
            const grid = document.getElementById('fileGrid');
            if(files.length === 0) {
                grid.innerHTML = `<div class="col-span-full p-20 text-center text-slate-500 italic">Keine Dateien in diesem Bereich gefunden.</div>`;
                return;
            }

            grid.innerHTML = files.map(file => {
                const ext = file.name.split('.').pop().toUpperCase();
                return `
                <div class="glass p-5 rounded-[2.5rem] card-hover flex flex-col gap-4">
                    <div class="flex justify-between items-start">
                        <div class="w-14 h-14 bg-slate-800 rounded-2xl flex items-center justify-center text-2xl">
                            ${getFileIcon(file.name)}
                        </div>
                        <span class="px-3 py-1 bg-blue-500/10 text-blue-500 text-[10px] font-black rounded-full">${ext}</span>
                    </div>
                    <div>
                        <h4 class="font-bold text-slate-100 truncate w-full" title="${file.name}">${file.name}</h4>
                        <p class="text-xs text-slate-500 mt-1">${(file.size / 1024).toFixed(1)} KB</p>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <button onclick="openPreview('${file.url}', '${file.download_url}', '${file.name}')" class="bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-xs font-bold transition-all">Vorschau</button>
                        <a href="${file.download_url}" target="_blank" class="bg-blue-600 hover:bg-blue-500 py-3 rounded-xl text-xs font-bold text-center transition-all">Download</a>
                    </div>
                </div>`;
            }).join('');
        }

        // 6. HELPER FUNCTIONS
        function getFileIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            if(['jpg','jpeg','png','gif','webp'].includes(ext)) return '🖼️';
            if(['mp4','webm','mov'].includes(ext)) return '🎬';
            if(['mp3','wav','ogg'].includes(ext)) return '🎵';
            if(['html','css','js'].includes(ext)) return '🌐';
            return '📄';
        }

        function filterBy(type) {
            if(type === 'all') return renderFiles(allFiles);
            const filtered = allFiles.filter(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                if(type === 'image') return ['jpg','jpeg','png','gif','webp'].includes(ext);
                if(type === 'video') return ['mp4','webm'].includes(ext);
                if(type === 'audio') return ['mp3','wav'].includes(ext);
            });
            renderFiles(filtered);
        }

        async function openPreview(apiUrl, dlUrl, name) {
            const ext = name.split('.').pop().toLowerCase();
            const modal = document.getElementById('previewModal');
            const body = document.getElementById('modalBody');
            document.getElementById('modalTitle').innerText = name;
            modal.classList.remove('hidden');
            body.innerHTML = '<div class="animate-pulse text-slate-500">Lade Vorschau...</div>';

            if(['jpg','jpeg','png','gif','webp'].includes(ext)) {
                body.innerHTML = `<img src="${dlUrl}" class="max-h-[70vh] rounded-2xl shadow-2xl">`;
            } else if(['mp4','webm'].includes(ext)) {
                body.innerHTML = `<video controls class="w-full rounded-2xl shadow-2xl" src="${dlUrl}"></video>`;
            } else if(['mp3','wav'].includes(ext)) {
                body.innerHTML = `<audio controls class="w-full max-w-md" src="${dlUrl}"></audio>`;
            } else {
                body.innerHTML = `<div class="text-center p-10"><p class="text-5xl mb-4">📄</p><p>Keine Live-Vorschau möglich.</p></div>`;
            }
        }

        function closePreview() { document.getElementById('previewModal').classList.add('hidden'); }
        function logout() { sessionStorage.removeItem('unlocked'); location.reload(); }

        // 7. LISTENERS
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            renderFiles(allFiles.filter(f => f.name.toLowerCase().includes(term)));
        });

        document.getElementById('pinInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') checkPin();
        });

        // AUTO-LOGIN CHECK
        if(sessionStorage.getItem('unlocked') === 'true') initDashboard();

    </script>
</body>
</html>
