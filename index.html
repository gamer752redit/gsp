<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Austausch | gamer752</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .file-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .file-card:hover { transform: translateY(-2px); background-color: #1e293b; border-color: #3b82f6; }
        #previewModal { backdrop-filter: blur(20px); }
        .preview-content img, .preview-content video { max-height: 70vh; border-radius: 12px; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 flex items-center justify-center bg-slate-950 z-[100]">
        <div class="max-w-md w-full m-4 bg-slate-900/50 border border-white/10 p-8 rounded-[2.5rem] shadow-2xl backdrop-blur-xl text-center">
            <div class="mb-8">
                <div class="bg-gradient-to-br from-blue-500 to-indigo-600 w-20 h-20 rounded-3xl flex items-center justify-center text-4xl mx-auto mb-6 shadow-2xl shadow-blue-500/20">🔒</div>
                <h2 class="text-3xl font-black text-white tracking-tight">Private Cloud</h2>
                <p id="greeting" class="text-slate-400 mt-2 font-medium"></p>
            </div>
            
            <input type="password" id="pinInput" placeholder="••••" maxlength="4" autofocus
                class="w-full p-5 bg-slate-950/50 border border-slate-700 rounded-2xl focus:ring-4 focus:ring-blue-600/20 focus:border-blue-500 outline-none text-center text-3xl tracking-[0.5em] mb-6 transition-all text-white">
            
            <button onclick="checkPin()" class="w-full bg-white text-black hover:bg-blue-500 hover:text-white font-black py-5 rounded-2xl transition-all active:scale-95 shadow-xl">
                ZUGRIFF BESTÄTIGEN
            </button>

            <div class="mt-10 p-5 bg-blue-500/5 rounded-2xl border border-blue-500/10">
                <p class="text-[11px] text-slate-500 leading-relaxed text-center uppercase tracking-widest font-bold">
                    Privater Bereich — Kein öffentlicher Zugriff<br>
                    <span class="opacity-50 font-normal mt-1 block">Jegliche Nutzung ohne explizite Erlaubnis von gamer752 ist untersagt.</span>
                </p>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="mainContent" class="max-w-5xl mx-auto hidden">
        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h1 class="text-5xl font-black text-white tracking-tighter mb-2">
                    GSP <span class="text-blue-500">SHARE</span>
                </h1>
                <p class="text-slate-400 font-medium">Willkommen zurück, <span class="text-blue-400">gamer752</span></p>
            </div>
            <div class="flex gap-2">
                <button onclick="logout()" class="bg-slate-800 hover:bg-red-900/40 text-slate-400 hover:text-red-400 px-4 py-2 rounded-xl transition-all text-xs font-bold uppercase tracking-widest">Logout</button>
            </div>
        </header>

        <!-- Funktion: Dateityp-Filter -->
        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="filterBy('all')" class="filter-btn bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Alles</button>
            <button onclick="filterBy('image')" class="filter-btn bg-slate-800 text-slate-400 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700">Bilder</button>
            <button onclick="filterBy('video')" class="filter-btn bg-slate-800 text-slate-400 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700">Videos</button>
            <button onclick="filterBy('audio')" class="filter-btn bg-slate-800 text-slate-400 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700">Musik</button>
        </div>

        <div class="relative mb-8">
            <input type="text" id="searchInput" placeholder="Datei suchen..." 
                class="w-full p-5 pl-12 bg-slate-900 border border-slate-800 rounded-2xl focus:ring-2 focus:ring-blue-600 outline-none transition-all shadow-inner">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 opacity-30">🔍</span>
        </div>

        <div id="fileList" class="grid gap-4"></div>
    </div>

    <!-- PREVIEW MODAL -->
    <div id="previewModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 bg-black/95">
        <div class="bg-slate-900 w-full max-w-5xl max-h-[90vh] rounded-[2rem] border border-white/10 overflow-hidden flex flex-col shadow-2xl">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-slate-900/50">
                <div class="flex items-center space-x-4">
                    <span id="modalIcon" class="text-2xl p-2 bg-slate-800 rounded-xl"></span>
                    <h2 id="modalTitle" class="font-bold truncate text-slate-200"></h2>
                </div>
                <button onclick="closePreview()" class="bg-slate-800 hover:bg-white hover:text-black w-10 h-10 rounded-full transition-all flex items-center justify-center font-bold">✕</button>
            </div>
            <div id="modalBody" class="p-4 overflow-auto flex-grow flex flex-col items-center justify-center"></div>
        </div>
    </div>

    <script>
        const repoOwner = "gamer752redit";
        const repoName = "gsp";
        const PIN = "7521";

        let allFiles = [];

        // Funktion 1: Dynamische Begrüßung
        function setGreeting() {
            const hour = new Date().getHours();
            const g = document.getElementById('greeting');
            if(hour < 12) g.innerText = "Guten Morgen!";
            else if(hour < 18) g.innerText = "Guten Tag!";
            else g.innerText = "Guten Abend!";
        }

        function checkPin() {
            const input = document.getElementById('pinInput');
            if (input.value === PIN) {
                sessionStorage.setItem('auth', 'true');
                unlockUI();
            } else {
                input.classList.add('animate-shake', 'border-red-500');
                setTimeout(() => {
                    input.classList.remove('animate-shake', 'border-red-500');
                    input.value = '';
                }, 400);
            }
        }

        function unlockUI() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            fetchFiles();
        }

        function logout() {
            sessionStorage.removeItem('auth');
            location.reload();
        }

        // Funktion 2: Intelligente Dateigrößen
        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        async function fetchFiles() {
            try {
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/`);
                const data = await response.json();
                allFiles = data.filter(f => f.type === 'file' && f.name !== 'index.html');
                renderFiles(allFiles);
            } catch (e) { console.error(e); }
        }

        // Funktion 3: Quick Copy Link
        async function copyToClipboard(url) {
            await navigator.clipboard.writeText(url);
            alert("Link kopiert!");
        }

        function getIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            const icons = {
                mp3: '🎵', wav: '🎵', mp4: '🎬', webm: '🎬',
                jpg: '🖼️', png: '🖼️', gif: '🖼️', html: '🌐', txt: '📝'
            };
            return icons[ext] || '📄';
        }

        function renderFiles(files) {
            const list = document.getElementById('fileList');
            list.innerHTML = files.map(file => `
                <div class="file-card bg-slate-900/50 p-5 rounded-3xl border border-slate-800 flex items-center justify-between gap-4">
                    <div class="flex items-center gap-4 overflow-hidden">
                        <div class="text-2xl">${getIcon(file.name)}</div>
                        <div class="truncate">
                            <h3 class="font-bold text-slate-100 truncate">${file.name}</h3>
                            <p class="text-xs text-slate-500 font-mono uppercase">${formatBytes(file.size)}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="copyToClipboard('${file.download_url}')" class="p-2 bg-slate-800 rounded-lg hover:bg-slate-700 transition-colors" title="Link kopieren">🔗</button>
                        <button onclick="openPreview('${file.url}', '${file.download_url}', '${file.name}')" class="bg-slate-800 px-4 py-2 rounded-xl text-sm font-bold">Vorschau</button>
                        <a href="${file.download_url}" target="_blank" class="bg-blue-600 px-4 py-2 rounded-xl text-sm font-bold">Laden</a>
                    </div>
                </div>
            `).join('');
        }

        // Funktion 4: Filter Logik
        function filterBy(type) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.replace('bg-blue-600', 'bg-slate-800'));
            event.target.classList.replace('bg-slate-800', 'bg-blue-600');

            if(type === 'all') return renderFiles(allFiles);
            const filtered = allFiles.filter(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                if(type === 'image') return ['jpg','jpeg','png','gif','webp'].includes(ext);
                if(type === 'video') return ['mp4','webm'].includes(ext);
                if(type === 'audio') return ['mp3','wav','ogg'].includes(ext);
            });
            renderFiles(filtered);
        }

        // Vorschau Logik
        async function openPreview(apiUrl, dlUrl, name) {
            const ext = name.split('.').pop().toLowerCase();
            const modal = document.getElementById('previewModal');
            const body = document.getElementById('modalBody');
            
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalIcon').innerText = getIcon(name);
            modal.classList.remove('hidden');
            body.innerHTML = 'Laden...';

            if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) {
                body.innerHTML = `<img src="${dlUrl}" class="shadow-2xl">`;
            } else if (['mp4', 'webm'].includes(ext)) {
                body.innerHTML = `<video controls autoplay class="w-full"><source src="${dlUrl}"></video>`;
            } else if (['mp3', 'wav'].includes(ext)) {
                body.innerHTML = `<div class="p-10 bg-slate-800 rounded-3xl"><audio controls autoplay src="${dlUrl}"></audio></div>`;
            } else {
                body.innerHTML = `<div class="text-center p-10"><p class="text-6xl mb-4">${getIcon(name)}</p><p class="text-slate-400">Keine Vorschau verfügbar.</p><a href="${dlUrl}" class="text-blue-500 underline mt-4 inline-block">Direkt öffnen</a></div>`;
            }
        }

        function closePreview() { document.getElementById('previewModal').classList.add('hidden'); }

        // Suche
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            renderFiles(allFiles.filter(f => f.name.toLowerCase().includes(term)));
        });

        // Init
        setGreeting();
        if (sessionStorage.getItem('auth') === 'true') unlockUI();
    </script>
</body>
</html>
